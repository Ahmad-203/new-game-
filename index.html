<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>NEON RUSH: PRO EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  /* CSS Reset and Variables */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --c-main: #00ffff;
    --c-bg: #050015;
    --font-main: 'Orbitron', monospace;
  }
  body, html { width: 100%; height: 100%; background: var(--c-bg); color: #fff; font-family: var(--font-main); overflow: hidden; touch-action: none; }
  
  /* Canvas */
  #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
  
  /* UI Screens */
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a0033 0%, #000 100%); z-index: 100; transition: opacity 0.3s ease; }
  .hidden { display: none !important; opacity: 0; pointer-events: none; }
  
  h1.title { font-size: clamp(40px, 8vw, 80px); color: var(--c-main); text-shadow: 0 0 20px var(--c-main); margin-bottom: 20px; text-align: center; }
  
  .btn { background: transparent; border: 2px solid var(--c-main); color: var(--c-main); padding: 15px 40px; font-size: 18px; font-family: inherit; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 10px; transition: all 0.2s; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 255, 255, 0.2); }
  .btn:hover, .btn:active { background: var(--c-main); color: #000; box-shadow: 0 0 20px var(--c-main); }
  
  /* HUD */
  #hud { position: absolute; top: 20px; left: 20px; z-index: 50; display: none; pointer-events: none; }
  .hud-stat { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #000; margin-bottom: 10px; }
  #hud-coins { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
  
  /* Camera Feed */
  #cam-container { position: absolute; bottom: 20px; right: 20px; width: 160px; height: 120px; border: 2px solid var(--c-main); border-radius: 10px; overflow: hidden; z-index: 50; display: none; }
  #cam-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  
  /* Mobile Controls */
  #mobile-controls { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: space-around; z-index: 50; display: none; padding: 0 20px; }
  .m-btn { width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.5); color: #fff; font-size: 24px; display: flex; align-items: center; justify-content: center; user-select: none; }
</style>
</head>
<body>

<!-- UI Screens -->
<div id="main-menu" class="screen">
  <h1 class="title">NEON RUSH</h1>
  <button class="btn" id="btn-play">Play Game</button>
  <button class="btn" id="btn-cam-play">Play with Camera (MoveNet)</button>
  <button class="btn" id="btn-shop">Shop & Characters</button>
  <button class="btn" id="btn-leaderboard">Leaderboard</button>
</div>

<div id="shop-screen" class="screen hidden">
  <h1 class="title">SHOP</h1>
  <p id="shop-coins" style="color: gold; font-size: 24px; margin-bottom: 20px;">Coins: 0</p>
  <button class="btn" id="btn-shop-back">Back to Menu</button>
</div>

<div id="game-over-screen" class="screen hidden">
  <h1 class="title" style="color: #ff0044;">WIPEOUT</h1>
  <h2 id="go-score" style="margin-bottom: 10px;">Score: 0</h2>
  <h2 id="go-coins" style="color: gold; margin-bottom: 30px;">Coins: 0</h2>
  <button class="btn" id="btn-restart">Main Menu</button>
</div>

<!-- Game Elements -->
<canvas id="gameCanvas"></canvas>
<div id="hud">
  <div class="hud-stat" id="hud-score">Score: 0</div>
  <div class="hud-stat" id="hud-coins">🪙 0</div>
</div>
<div id="cam-container">
  <video id="cam-video" autoplay playsinline muted></video>
</div>
<div id="mobile-controls">
  <div class="m-btn" id="m-left">◄</div>
  <div class="m-btn" id="m-jump">▲</div>
  <div class="m-btn" id="m-slide">▼</div>
  <div class="m-btn" id="m-right">►</div>
</div>

<!-- TensorFlow & MoveNet -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.10.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.10.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
/**
 * MODULE: SaveSystem
 */
const SaveSystem = {
  data: { coins: 0, highScores: [], unlockedChars: ['default'], currentChar: 'default' },
  load() {
    const saved = localStorage.getItem('neonRushSave_v2');
    if (saved) this.data = { ...this.data, ...JSON.parse(saved) };
  },
  save() {
    localStorage.setItem('neonRushSave_v2', JSON.stringify(this.data));
  },
  addCoins(amount) { this.data.coins += amount; this.save(); }
};

/**
 * MODULE: CameraController (MoveNet)
 */
const CameraController = {
  detector: null,
  active: false,
  videoEl: document.getElementById('cam-video'),
  container: document.getElementById('cam-container'),
  
  async init() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240, facingMode: 'user' } });
      this.videoEl.srcObject = stream;
      await new Promise(resolve => this.videoEl.onloadedmetadata = resolve);
      
      await tf.ready();
      this.detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, {
        modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING,
        enableSmoothing: true
      });
      
      this.active = true;
      this.container.style.display = 'block';
      this.detectLoop();
    } catch (err) {
      console.error("Camera access denied or failed.", err);
      alert("Camera initialization failed. Falling back to touch/keyboard controls.");
    }
  },
  
  async detectLoop() {
    if (!this.active || !GameEngine.isRunning) return;
    
    if (this.detector) {
      const poses = await this.detector.estimatePoses(this.videoEl, { flipHorizontal: true });
      if (poses.length > 0) {
        const keypoints = poses[0].keypoints;
        const nose = keypoints.find(k => k.name === 'nose');
        
        // Confidence threshold
        if (nose && nose.score > 0.4) {
          const xRatio = nose.x / 320;
          const yRatio = nose.y / 240;
          
          // Determine Lean (Left/Right)
          if (xRatio < 0.35) Player.moveLeft();
          else if (xRatio > 0.65) Player.moveRight();
          
          // Determine Jump/Crouch
          if (yRatio < 0.3) Player.jump();
          else if (yRatio > 0.7) Player.slide();
        }
      }
    }
    requestAnimationFrame(() => this.detectLoop());
  },
  
  stop() {
    this.active = false;
    this.container.style.display = 'none';
    if (this.videoEl.srcObject) {
      this.videoEl.srcObject.getTracks().forEach(track => track.stop());
    }
  }
};

/**
 * MODULE: Player
 */
const Player = {
  lane: 1, // 0: Left, 1: Center, 2: Right
  isJumping: false,
  isSliding: false,
  
  moveLeft() { if (this.lane > 0) this.lane--; },
  moveRight() { if (this.lane < 2) this.lane++; },
  jump() { if (!this.isJumping && !this.isSliding) { this.isJumping = true; setTimeout(() => this.isJumping = false, 600); } },
  slide() { if (!this.isJumping && !this.isSliding) { this.isSliding = true; setTimeout(() => this.isSliding = false, 600); } }
};

/**
 * MODULE: GameEngine
 */
const GameEngine = {
  canvas: document.getElementById('gameCanvas'),
  ctx: document.getElementById('gameCanvas').getContext('2d'),
  isRunning: false,
  score: 0,
  sessionCoins: 0,
  lastTime: 0,
  
  start(useCamera) {
    this.isRunning = true;
    this.score = 0;
    this.sessionCoins = 0;
    Player.lane = 1;
    
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('game-over-screen').classList.add('hidden');
    this.canvas.style.display = 'block';
    document.getElementById('hud').style.display = 'block';
    
    // Show mobile controls if not using camera
    if (useCamera) {
      CameraController.init();
    } else {
      if ('ontouchstart' in window) document.getElementById('mobile-controls').style.display = 'flex';
    }
    
    this.resize();
    window.addEventListener('resize', () => this.resize());
    
    this.lastTime = performance.now();
    requestAnimationFrame((ts) => this.loop(ts));
  },
  
  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
  },
  
  stop() {
    this.isRunning = false;
    this.canvas.style.display = 'none';
    document.getElementById('hud').style.display = 'none';
    document.getElementById('mobile-controls').style.display = 'none';
    CameraController.stop();
    
    SaveSystem.addCoins(this.sessionCoins);
    
    document.getElementById('go-score').innerText = `Score: ${Math.floor(this.score)}`;
    document.getElementById('go-coins').innerText = `Coins: ${this.sessionCoins}`;
    document.getElementById('game-over-screen').classList.remove('hidden');
  },
  
  loop(timestamp) {
    if (!this.isRunning) return;
    const dt = timestamp - this.lastTime;
    this.lastTime = timestamp;
    
    this.update(dt);
    this.draw();
    
    requestAnimationFrame((ts) => this.loop(ts));
  },
  
  update(dt) {
    this.score += dt * 0.01;
    document.getElementById('hud-score').innerText = `Score: ${Math.floor(this.score)}`;
    
    // Placeholder logic for game over condition
    if (this.score > 500 && Math.random() < 0.001) {
      this.stop();
    }
  },
  
  draw() {
    this.ctx.fillStyle = '#050015';
    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
    
    // Draw pseudo-3D grid and player (Simplified for architecture demonstration)
    this.ctx.fillStyle = '#00ffff';
    const playerX = (this.canvas.width / 2) + ((Player.lane - 1) * 100);
    const playerY = this.canvas.height - 150 - (Player.isJumping ? 100 : 0) + (Player.isSliding ? 50 : 0);
    
    this.ctx.fillRect(playerX - 25, playerY, 50, Player.isSliding ? 25 : 50);
  }
};

/**
 * MODULE: UIManager & Event Listeners
 */
SaveSystem.load();

document.getElementById('btn-play').addEventListener('click', () => GameEngine.start(false));
document.getElementById('btn-cam-play').addEventListener('click', () => GameEngine.start(true));
document.getElementById('btn-restart').addEventListener('click', () => {
  document.getElementById('game-over-screen').classList.add('hidden');
  document.getElementById('main-menu').classList.remove('hidden');
});

// Keyboard Controls Fallback
window.addEventListener('keydown', (e) => {
  if (!GameEngine.isRunning) return;
  if (e.key === 'ArrowLeft') Player.moveLeft();
  if (e.key === 'ArrowRight') Player.moveRight();
  if (e.key === 'ArrowUp') Player.jump();
  if (e.key === 'ArrowDown') Player.slide();
});

// Touch Controls Handlers
document.getElementById('m-left').addEventListener('touchstart', (e) => { e.preventDefault(); Player.moveLeft(); });
document.getElementById('m-right').addEventListener('touchstart', (e) => { e.preventDefault(); Player.moveRight(); });
document.getElementById('m-jump').addEventListener('touchstart', (e) => { e.preventDefault(); Player.jump(); });
document.getElementById('m-slide').addEventListener('touchstart', (e) => { e.preventDefault(); Player.slide(); });

</script>
</body>
</html>
