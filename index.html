<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON RUSH MOBILE — Pro Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* --- MOBILE OPTIMIZATIONS --- */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { background:#000; overflow:hidden; width:100vw; height:100vh; font-family:'Orbitron',monospace; user-select:none; touch-action: none; }
#gameCanvas { position:absolute; top:0; left:0; width:100%; height:100%; display:block; }

/* HUD Improvements */
#hud { position:fixed; top:10px; left:15px; z-index:200; pointer-events:none; }
#scoreVal { font-size:32px; font-weight:900; color:#fff; text-shadow:0 0 15px #0ff; }
#livesVal { font-size:24px; margin-top:5px; }

/* MOBILE CONTROLS - THE VIRTUAL JOYSTICK */
#mobileControls {
    position: fixed; bottom: 30px; left: 0; width: 100%; 
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 0 20px; z-index: 300; pointer-events: none;
}
.ctrl-group { display: flex; gap: 15px; pointer-events: auto; }
.btn {
    width: 70px; height: 70px; background: rgba(0, 255, 255, 0.1);
    border: 2px solid rgba(0, 255, 255, 0.4); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #0ff; font-size: 24px; transition: all 0.1s;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
}
.btn:active { background: rgba(0, 255, 255, 0.4); transform: scale(0.9); box-shadow: 0 0 25px #0ff; }
.btn-action { width: 85px; height: 85px; border-color: #f0f; color: #f0f; background: rgba(240, 0, 255, 0.1); }
.btn-action:active { background: rgba(240, 0, 255, 0.4); border-color: #f0f; }

/* SCREENS */
.screen {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background: radial-gradient(circle, #050015 0%, #000 100%);
  z-index:500; text-align: center; padding: 20px;
}
.logo { font-size: 48px; font-weight: 900; color: #0ff; text-shadow: 0 0 20px #0ff; margin-bottom: 20px; }
.bigbtn {
  background: #0ff; border: none; color: #000; font-family: 'Orbitron';
  padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 50px;
  box-shadow: 0 0 20px #0ff; margin: 10px; cursor: pointer;
}
.gone { display: none !important; }

/* CAMERA PANEL */
#camPanel { position: fixed; top: 10px; right: 10px; z-index: 400; scale: 0.7; transform-origin: top right; }
#camWrap { display:none; border: 2px solid #0ff; width: 160px; height: 120px; border-radius: 10px; overflow: hidden; position: relative; }
#camWrap.on { display: block; }
video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud">
  <div id="scoreVal">0</div>
  <div id="coinsVal">🪙 0</div>
  <div id="livesVal">❤️❤️❤️</div>
</div>

<!-- NEW MOBILE BUTTONS -->
<div id="mobileControls" id="btnOverlay">
    <div class="ctrl-group">
        <div class="btn" id="btnLeft">◀</div>
        <div class="btn" id="btnRight">▶</div>
    </div>
    <div class="ctrl-group">
        <div class="btn btn-action" id="btnSlide">▼</div>
        <div class="btn btn-action" id="btnJump">▲</div>
    </div>
</div>

<div id="camPanel">
    <div id="camWrap">
        <video id="camVideo" autoplay muted playsinline></video>
    </div>
</div>

<div class="screen" id="startScreen">
  <div class="logo">NEON RUSH</div>
  <p style="color: #0ff; margin-bottom: 30px; letter-spacing: 2px;">MOBILE PRO EDITION</p>
  <button class="bigbtn" onclick="startGame(false)">PLAY NOW</button>
  <button class="bigbtn" style="background:#f0f; box-shadow: 0 0 20px #f0f;" onclick="startGame(true)">USE CAMERA</button>
</div>

<div class="screen gone" id="gameOverScreen">
  <h1 style="color: #ff4444; font-size: 50px;">WIPEOUT</h1>
  <div id="goScore" style="color:#fff; font-size: 24px; margin: 20px;">SCORE: 0</div>
  <button class="bigbtn" onclick="location.reload()">RESTART</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.10.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.10.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

</html>
