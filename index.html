<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NEON RUSH PRO — AI Motion Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
<style>
    :root {
        --neon-blue: #00ffff;
        --neon-pink: #ff00ff;
        --safe-top: env(safe-area-inset-top);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
        background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; 
        width: 100vw; height: 100vh; touch-action: none;
    }
    canvas { display: block; width: 100%; height: 100%; }

    /* HUD & UI */
    #hud {
        position: fixed; top: 20px; left: 20px; z-index: 10;
        pointer-events: none; color: white; text-shadow: 0 0 10px var(--neon-blue);
    }
    #score { font-size: 2rem; font-weight: 900; }
    #coins { color: #ffd700; font-size: 1.2rem; }

    /* CAMERA FEED */
    #camContainer {
        position: fixed; bottom: 20px; right: 20px;
        width: 120px; height: 90px; border: 2px solid var(--neon-blue);
        border-radius: 8px; overflow: hidden; background: #111;
        opacity: 0.8; transition: opacity 0.3s;
    }
    #camContainer.inactive { opacity: 0.2; }
    #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

    /* MOBILE CONTROLS Overlay */
    #controls {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 40px; z-index: 5;
    }
    .btn {
        width: 70px; height: 70px; border-radius: 50%;
        background: rgba(255,255,255,0.1); border: 2px solid var(--neon-blue);
        display: flex; align-items: center; justify-content: center; color: white;
        font-size: 24px; box-shadow: 0 0 15px var(--neon-blue);
    }

    /* SCREENS */
    .screen {
        position: fixed; inset: 0; background: rgba(0,0,0,0.9);
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; z-index: 100; text-align: center;
    }
    .hide { display: none !important; }
    h1 { font-size: 3rem; color: var(--neon-blue); margin-bottom: 20px; }
    .play-btn {
        padding: 15px 40px; font-family: inherit; font-size: 1.5rem;
        background: none; border: 2px solid var(--neon-pink); color: white;
        cursor: pointer; box-shadow: 0 0 20px var(--neon-pink);
    }
</style>
</head>
<body>

<div id="hud">
    <div id="score">00000</div>
    <div id="coins">🪙 0</div>
    <div id="lives">❤️❤️❤️</div>
</div>

<div id="camContainer" class="inactive">
    <video id="video" playsinline></video>
</div>

<div id="startScreen" class="screen">
    <h1>NEON RUSH</h1>
    <p style="color: white; margin-bottom: 20px;">AI CAMERA CONTROL READY</p>
    <button class="play-btn" onclick="startGame()">START RUN</button>
</div>

<div id="controls">
    <div class="btn" id="btnLeft">◀</div>
    <div class="btn" id="btnJump">▲</div>
    <div class="btn" id="btnRight">▶</div>
</div>

<canvas id="gameCanvas"></canvas>

<!-- TFJS Dependencies -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

<script>
/** 
 * GAME ENGINE CORE 
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let width, height, detector;
let gameActive = false;

// Configuration
const CONFIG = {
    laneWidth: 150,
    speed: 8,
    jumpPower: 15,
    gravity: 0.8,
    sensitivity: 40 // Pixels of lean for movement
};

// Player Object
const player = {
    lane: 1, // 0, 1, 2
    x: 0,
    y: 0,
    targetX: 0,
    vy: 0,
    isJumping: false,
    score: 0,
    coins: 0,
    lives: 3
};

// State Arrays
let obstacles = [];
let particles = [];

/**
 * CAMERA CONTROLLER (AI)
 */
async function initAI() {
    const model = poseDetection.SupportedModels.MoveNet;
    detector = await poseDetection.createDetector(model, {
        modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING
    });
    
    const video = document.getElementById('video');
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    video.play();
    document.getElementById('camContainer').classList.remove('inactive');
    detectPose();
}

async function detectPose() {
    if (detector) {
        const poses = await detector.estimatePoses(document.getElementById('video'));
        if (poses.length > 0) {
            const nose = poses[0].keypoints.find(k => k.name === 'nose');
            const leftShoulder = poses[0].keypoints.find(k => k.name === 'left_shoulder');
            const rightShoulder = poses[0].keypoints.find(k => k.name === 'right_shoulder');

            if (nose && nose.score > 0.5) {
                // Lean Logic (Inverted because camera is mirrored)
                const centerX = 60; // Half of video width
                if (nose.x < centerX - 15) movePlayer(2);
                else if (nose.x > centerX + 15) movePlayer(0);
                else movePlayer(1);

                // Jump logic based on nose height change
                if (nose.y < 30 && !player.isJumping) jump();
            }
        }
    }
    requestAnimationFrame(detectPose);
}

/**
 * GAME LOGIC
 */
function movePlayer(lane) {
    player.lane = lane;
    player.targetX = (lane - 1) * CONFIG.laneWidth;
}

function jump() {
    if (!player.isJumping) {
        player.vy = -CONFIG.jumpPower;
        player.isJumping = true;
    }
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

function update() {
    if (!gameActive) return;

    // Smooth movement
    player.x += (player.targetX - player.x) * 0.2;

    // Physics
    player.y += player.vy;
    player.vy += CONFIG.gravity;

    if (player.y >= 0) {
        player.y = 0;
        player.vy = 0;
        player.isJumping = false;
    }

    // Obstacle Logic
    if (Math.random() < 0.02) {
        obstacles.push({
            x: (Math.floor(Math.random() * 3) - 1) * CONFIG.laneWidth,
            z: height,
            width: 80,
            height: 50
        });
    }

    obstacles.forEach((obs, index) => {
        obs.z -= CONFIG.speed;
        // Simple 2D Collision for the demo
        if (obs.z < 100 && obs.z > 0 && Math.abs(obs.x - player.x) < 40 && player.y > -20) {
            hitObstacle();
            obstacles.splice(index, 1);
        }
        if (obs.z < -100) obstacles.splice(index, 1);
    });

    player.score += 1;
    document.getElementById('score').innerText = player.score.toString().padStart(5, '0');
}

function draw() {
    ctx.clearRect(0, 0, width, height);
    
    // Draw Perspective Grid
    ctx.strokeStyle = '#00ffff44';
    ctx.lineWidth = 2;
    for(let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(width/2 + i * CONFIG.laneWidth, height);
        ctx.lineTo(width/2 + i * 50, height/2);
        ctx.stroke();
    }

    // Draw Player (Neon Cube)
    ctx.save();
    ctx.translate(width/2 + player.x, height - 150 + player.y);
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#ff00ff';
    ctx.fillStyle = '#ff00ff';
    ctx.fillRect(-25, -25, 50, 50);
    ctx.restore();

    // Draw Obstacles
    ctx.fillStyle = '#ff0000';
    obstacles.forEach(obs => {
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'red';
        ctx.fillRect(width/2 + obs.x - 40, height - obs.z, 80, 40);
    });

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

function hitObstacle() {
    player.lives--;
    document.getElementById('lives').innerText = '❤️'.repeat(player.lives);
    if (player.lives <= 0) location.reload();
}

function startGame() {
    document.getElementById('startScreen').classList.add('hide');
    gameActive = true;
    initAI();
}

// Touch/Click Fallbacks
document.getElementById('btnLeft').onclick = () => movePlayer(0);
document.getElementById('btnJump').onclick = () => jump();
document.getElementById('btnRight').onclick = () => movePlayer(2);

window.addEventListener('resize', resize);
resize();
draw();
</script>
</body>
</html>
